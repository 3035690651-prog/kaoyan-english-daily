name: 每日新闻自动更新（DeepSeek V4 Flash + 考研高频词）

on:
  schedule:
    - cron: '0 0 * * *'  # 每天UTC时间0点 = 北京时间早上8点
  workflow_dispatch:  # 允许手动点击更新

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai

      - name: 生成更新脚本（考研高频词版）
        run: |
          cat > update_news.py << 'EOF'
