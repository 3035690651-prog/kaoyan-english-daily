              "work": {"phonetic": "/wɜːk/", "meaning": "n. 工作；[物] 功；产品；操作；职业；行为；工厂 v. 工作；运作；起作用", "category": "高频词汇"},
              "world": {"phonetic": "/wɜːld/", "meaning": "n. 世界；领域；世俗；全人类；物质生活", "category": "高频词汇"},
              "would": {"phonetic": "/wʊd/", "meaning": "aux. 将，将要；愿意 v. will的过去式", "category": "高频词汇"},
              "write": {"phonetic": "/raɪt/", "meaning": "vi. 写，写字；写作，作曲；写信 vt. 写，书写；写信给；著述", "category": "高频词汇"},
              "year": {"phonetic": "/jɪə/", "meaning": "n. 年；年度；历年；年纪；一年的期间；某年级的学生", "category": "高频词汇"},
              "you": {"phonetic": "/juː/", "meaning": "pron. 你；你们", "category": "高频词汇"},
              "your": {"phonetic": "/jɔː/", "meaning": "pron. 你的，你们的", "category": "高频词汇"}
          }

          def fetch_news_from_rss(category, rss_url):
              """从RSS源获取新闻（永远不会被屏蔽）"""
              try:
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"}
                  time.sleep(random.uniform(0.5, 2.0))
                  feed = feedparser.parse(rss_url, request_headers=headers)
                  
                  if feed.bozo != 0:
                      print(f"解析{category} RSS失败: {feed.bozo_exception}")
                      return []
                  
                  articles = []
                  for entry in feed.entries[:2]:
                      articles.append({
                          "title": entry.title,
                          "link": entry.link,
                          "summary": entry.summary,
                          "category": category
                      })
                  
                  print(f"✅ 成功获取{category}新闻: {len(articles)}篇")
                  return articles
                  
              except Exception as e:
                  print(f"❌ 获取{category}新闻失败: {str(e)}")
                  return []

          def process_with_deepseek(article):
              """用DeepSeek V4 Flash处理文章，生成考研英语学习内容"""
              # DeepSeek API完全兼容OpenAI格式
              client = OpenAI(
                  api_key=os.getenv("DEEPSEEK_API_KEY"),
                  base_url="https://api.deepseek.com"
              )
              
              prompt = f"""
              请将下面这篇英文新闻处理成适合考研英语学习的内容：
              标题：{article['title']}
              内容摘要：{article['summary']}
              原文链接：{article['link']}
              
              严格按照以下要求处理：
              1. 提取300-400字的核心英文内容，保留原文风格
              2. 生成准确流畅的中文译文
              3. 标注其中的考研核心词汇，用<span class='vocab-highlight' data-word='单词'>包裹
              4. 识别2-3个长难句，生成详细解析
              5. 难度分级：英语一/英语二
              
              返回严格的JSON格式，不要任何额外文字和解释：
              {{
                  "content": "处理后的英文内容",
                  "contentCn": "中文译文",
                  "vocabWords": ["单词1", "单词2"],
                  "sentences": [{{"original": "原句", "translation": "译文", "structure": ["结构1", "结构2"], "points": ["考点1", "考点2"]}}],
                  "difficulty": "英语一"
              }}
              """
              
              try:
                  # 使用DeepSeek V4 Flash模型（免费额度最多，500万Token）
                  response = client.chat.completions.create(
                      model="deepseek-chat",
                      messages=[{"role": "user", "content": prompt}],
                      temperature=0.2,
                      timeout=30
                  )
                  return json.loads(response.choices[0].message.content.strip())
              except Exception as e:
                  print(f"❌ DeepSeek AI处理文章失败: {str(e)}")
                  return None

          def update_html_file(new_articles):
              """更新index.html中的新闻数据"""
              with open("index.html", "r", encoding="utf-8") as f:
                  html = f.read()
              
              import re
              news_data_str = json.dumps(new_articles, ensure_ascii=False, indent=4)
              html = re.sub(r'const newsData = \[.*?\];', f'const newsData = {news_data_str};', html, flags=re.DOTALL)
              
              with open("index.html", "w", encoding="utf-8") as f:
                  f.write(html)

          if __name__ == "__main__":
              all_articles = []
              today = datetime.now().strftime("%Y-%m-%d")
              
              print("🚀 开始抓取今日新闻...")
              for category, rss_url in NEWS_SOURCES.items():
                  articles = fetch_news_from_rss(category, rss_url)
                  for article in articles[:1]:  # 每个类别取1篇，控制API消耗
                      print(f"正在处理: {article['title'][:50]}...")
                      processed = process_with_deepseek(article)
                      if processed:
                          processed.update({
                              "id": len(all_articles) + 1,
                              "date": today,
                              "title": article['title'],
                              "titleCn": processed.pop("titleCn", ""),
                              "source": article['link'].split('/')[2],
                              "summary": processed['content'][:150] + "...",
                              "summaryCn": processed['contentCn'][:150] + "..."
                          })
                          all_articles.append(processed)
              
              if all_articles:
                  update_html_file(all_articles)
                  print(f"\n🎉 更新完成！共添加{len(all_articles)}篇今日新闻")
              else:
                  print("\n⚠️ 没有获取到有效新闻，跳过本次更新")
          EOF

      - name: 运行更新脚本
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python update_news.py

      - name: 提交并推送更新
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          message: "每日新闻更新: ${{ github.run_id }}"
