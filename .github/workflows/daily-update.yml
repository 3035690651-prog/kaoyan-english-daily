          NEWS_SOURCES = {
              "technology": "https://www.sciencedaily.com/rss/top/technology.xml",
              "environment": "https://www.sciencedaily.com/rss/top/environment.xml",
              "health": "https://www.sciencedaily.com/rss/top/health.xml",
              "science": "https://www.sciencedaily.com/rss/top/science.xml",
              "education": "https://feeds.bbci.co.uk/news/education/rss.xml",
              "business": "https://feeds.bbci.co.uk/news/business/rss.xml"
