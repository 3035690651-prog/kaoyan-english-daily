<style>
:root {
  --vocab-green: #10b981;
  --vocab-green-bg: #d1fae5;
  --vocab-green-bg-dark: #064e3b;
  --sentence-purple: #8b5cf6;
  --sentence-purple-bg: #ede9fe;
  --sentence-purple-bg-dark: #2e1065;
}
.vocab-highlight {
  color: var(--vocab-green);
  border-bottom: 2px dashed var(--vocab-green);
  cursor: pointer;
  padding: 0 2px;
  border-radius: 2px;
  transition: all .2s;
  position: relative;
}
.vocab-highlight:hover { background: var(--vocab-green-bg); }
.dark .vocab-highlight:hover { background: var(--vocab-green-bg-dark); }
.vocab-highlight.in-vocab-book { background: var(--vocab-green-bg); font-weight: 600; }
.dark .vocab-highlight.in-vocab-book { background: var(--vocab-green-bg-dark); }

.sentence-mark {
  border-left: 3px solid var(--sentence-purple);
  padding: 6px 10px;
  margin: 4px 0;
  display: block;
  cursor: pointer;
  border-radius: 0 6px 6px 0;
  transition: all .25s;
  background: var(--sentence-purple-bg);
}
.dark .sentence-mark { background: var(--sentence-purple-bg-dark); }
.sentence-mark:hover { box-shadow: 0 2px 8px rgba(139,92,246,.25); transform: translateX(2px); }
.sentence-mark.active { box-shadow: 0 0 0 3px rgba(139,92,246,.35); }

/* Article content typography */
.article-content p { margin-bottom: 1.25em; line-height: 1.9; }
.article-content .cn-trans { color: #6b7280; font-size: .92em; border-left: 2px solid #d1d5db; padding-left: 12px; margin-top: 6px; margin-bottom: 1.25em; }
.dark .article-content .cn-trans { color: #9ca3af; border-left-color: #4b5563; }

/* Tooltip */
.vocab-tooltip {
  position: fixed; z-index: 9999;
  background: #1f2937; color: #f9fafb;
  padding: 10px 14px; border-radius: 8px;
  font-size: 14px; max-width: 260px;
  pointer-events: none; opacity: 0; transform: translateY(4px);
  transition: opacity .18s, transform .18s;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
}
.vocab-tooltip.show { opacity: 1; transform: translateY(0); }
.vocab-tooltip .tt-word { font-weight: 700; font-size: 16px; color: #10b981; }
.vocab-tooltip .tt-phonetic { font-size: 12px; color: #9ca3af; margin-left: 6px; }
.vocab-tooltip .tt-meaning { display: block; margin-top: 4px; color: #e5e7eb; }
.vocab-tooltip .tt-hint { font-size: 11px; color: #6b7280; margin-top: 4px; }

/* Sentence analysis panel */
.sentence-panel {
  background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
  padding: 18px; margin: 14px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.dark .sentence-panel { background: #1f2937; border-color: #374151; }
.sentence-panel .sp-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 6px;
}
.sentence-panel .sp-original { font-style: italic; color: #374151; margin-bottom: 8px; }
.dark .sentence-panel .sp-original { color: #d1d5db; }

/* Heart animation */
@keyframes heartBeat {
  0% { transform: scale(1); }
  25% { transform: scale(1.3); }
  50% { transform: scale(1); }
  75% { transform: scale(1.3); }
  100% { transform: scale(1); }
}
.heart-beat { animation: heartBeat .4s ease; }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
.dark ::-webkit-scrollbar-thumb { background: #4b5563; }

/* Transitions */
.view-enter { animation: fadeSlideIn .3s ease; }
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@media print {
  nav, .no-print, .vocab-tooltip { display: none !important; }
  body { font-size: 12pt; }
}
</style>

// ================================================================
//  STATE MANAGEMENT
// ================================================================

const STATE = {
  view: 'home',
  dark: localStorage.getItem('de_dark') === '1',
  showChinese: localStorage.getItem('de_showCn') !== '0',
  vocabBook: JSON.parse(localStorage.getItem('de_vocabBook') || '[]'),
  favorites: JSON.parse(localStorage.getItem('de_favs') || '[]'),
  filterDate: 'all',
  filterCat: 'all',
  filterDiff: 'all',
  currentArticle: null,
  vocabBookFilter: 'all'
};

function save() {
  localStorage.setItem('de_dark', STATE.dark ? '1' : '0');
  localStorage.setItem('de_showCn', STATE.showChinese ? '1' : '0');
  localStorage.setItem('de_vocabBook', JSON.stringify(STATE.vocabBook));
  localStorage.setItem('de_favs', JSON.stringify(STATE.favorites));
}

// Restore favorites state on news data
NEWS_DATA.forEach(a => { a.isFavorited = STATE.favorites.includes(a.id); });

// ================================================================
//  DARK MODE
// ================================================================

function applyDark() {
  document.documentElement.classList.toggle('dark', STATE.dark);
}
function toggleDark() { STATE.dark = !STATE.dark; applyDark(); save(); }

// ================================================================
//  NAVIGATION
// ================================================================

function navigateTo(view, data) {
  STATE.view = view;
  STATE.currentArticle = data || null;
  updateNavHighlight();
  if (view === 'home') renderHome();
  else if (view === 'article') renderArticle(data);
  else if (view === 'vocab') renderVocabBook();
  else if (view === 'favorites') renderFavorites();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateNavHighlight() {
  const btns = { home: 'navHome', vocab: 'navVocab', favorites: 'navFav' };
  Object.entries(btns).forEach(([v, id]) => {
    const el = document.getElementById(id);
    if (v === STATE.view) {
      el.className = 'px-3 py-1.5 rounded-lg text-sm font-medium bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300 transition-colors';
    } else {
      el.className = 'px-3 py-1.5 rounded-lg text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors';
    }
  });
  updateBadges();
}

function updateBadges() {
  const vb = document.getElementById('vocabBadge');
  if (STATE.vocabBook.length > 0) { vb.textContent = STATE.vocabBook.length; vb.classList.remove('hidden'); }
  else vb.classList.add('hidden');

  const fb = document.getElementById('favBadge');
  if (STATE.favorites.length > 0) { fb.textContent = STATE.favorites.length; fb.classList.remove('hidden'); }
  else fb.classList.add('hidden');
}

  // Bind vocab word events
  setTimeout(bindArticleEvents, 100);
}

function bindArticleEvents() {
  // Vocab highlights hover
  document.querySelectorAll('.vocab-highlight').forEach(el => {
    el.addEventListener('mouseenter', showTooltip);
    el.addEventListener('mousemove', moveTooltip);
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const word = this.dataset.word;
      toggleVocabWordGlobal(word, this);
    });
    // Style if in vocab book
    if (STATE.vocabBook.includes(el.dataset.word)) {
      el.classList.add('in-vocab-book');
    }
  });

  // Sentence marks
  document.querySelectorAll('.sentence-mark').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const sid = parseInt(this.dataset.sid);
      if (STATE.currentArticle) {
        showSentenceDetail(STATE.currentArticle.id, sid);
      }
    });
  });
}

function toggleChinese() {
  STATE.showChinese = !STATE.showChinese;
  save();
  if (STATE.currentArticle) renderArticle(STATE.currentArticle.id);
}

function adjustFontSize(delta) {
  const content = document.getElementById('articleContent');
  if (!content) return;
  const current = parseFloat(getComputedStyle(content).fontSize);
  content.style.fontSize = Math.max(14, Math.min(22, current + delta)) + 'px';
}

// ================================================================
//  TOOLTIP
// ================================================================

function showTooltip(e) {
  const word = this.dataset.word;
  const info = lookupVocab(word);
  if (!info) return;
  const tt = document.getElementById('wordTooltip');
  tt.querySelector('.tt-word').textContent = info.word;
  tt.querySelector('.tt-phonetic').textContent = info.p || '';
  tt.querySelector('.tt-meaning').textContent = info.m || '';
  tt.querySelector('.tt-hint').textContent = STATE.vocabBook.includes(info.word) ? 'вң“ е·ІеңЁиҜҚжұҮжң¬дёӯ' : 'зӮ№еҮ»еҠ е…ҘиҜҚжұҮжң¬';
  tt.classList.add('show');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('wordTooltip');
  let x = e.clientX + 16, y = e.clientY - 8;
  if (x + tt.offsetWidth > window.innerWidth) x = e.clientX - tt.offsetWidth - 16;
  if (y + tt.offsetHeight > window.innerHeight) y = e.clientY - tt.offsetHeight - 8;
  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('wordTooltip').classList.remove('show');
}

// ================================================================
//  VOCAB BOOK MANAGEMENT
// ================================================================

function toggleVocabWord(word, el) {
  const idx = STATE.vocabBook.indexOf(word);
  if (idx >= 0) {
    STATE.vocabBook.splice(idx, 1);
    if (el) { el.classList.remove('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-900', 'dark:text-emerald-300'); el.classList.add('bg-gray-100', 'text-gray-600', 'dark:bg-gray-700', 'dark:text-gray-300'); const icon = el.querySelector('i'); if (icon) { icon.className = 'fas fa-plus text-gray-400 text-[10px]'; } }
  } else {
    STATE.vocabBook.push(word);
    if (el) { el.classList.add('bg-emerald-100', 'text-emerald-700', 'dark:bg-emerald-900', 'dark:text-emerald-300'); el.classList.remove('bg-gray-100', 'text-gray-600', 'dark:bg-gray-700', 'dark:text-gray-300'); const icon = el.querySelector('i'); if (icon) { icon.className = 'fas fa-check text-emerald-500 text-[10px]'; } }
  }
  save();
  updateBadges();
  // Update highlights if on article page
  if (STATE.view === 'article') {
    document.querySelectorAll(`.vocab-highlight[data-word="${word}"]`).forEach(hl => {
      hl.classList.toggle('in-vocab-book', STATE.vocabBook.includes(word));
    });
  }
}

function toggleVocabWordGlobal(word, highlightEl) {
  const idx = STATE.vocabBook.indexOf(word);
  if (idx >= 0) {
    STATE.vocabBook.splice(idx, 1);
  } else {
    STATE.vocabBook.push(word);
  }
  save();
  updateBadges();
  if (highlightEl) {
    highlightEl.classList.toggle('in-vocab-book', STATE.vocabBook.includes(word));
  }
  // Update vocab tags on article page
  const tag = document.querySelector(`[data-word="${word}"]`);
  if (tag) {
    const inBook = STATE.vocabBook.includes(word);
    const info = lookupVocab(word);
    tag.className = `inline-flex items-center gap-1 px-3 py-1.5 rounded-lg text-sm cursor-pointer transition-all ${inBook?'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300':'bg-gray-100 text-gray-600 dark:bg-gray-700 dark:text-gray-300 hover:bg-emerald-50 dark:hover:bg-emerald-900'}`;
    const icon = tag.querySelector('i');
    if (icon) icon.className = `fas ${inBook?'fa-check text-emerald-500':'fa-plus text-gray-400'} text-[10px]`;
  }
}

// ================================================================
//  VOCAB BOOK PAGE
// ================================================================

function renderVocabBook() {
  const app = document.getElementById('app');
  let words = [...STATE.vocabBook];

  const app_html = `
    <div class="view-enter max-w-4xl mx-auto">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
          <h2 class="text-xl font-bold flex items-center gap-2"><span class="text-emerald-500">&#128218;</span> жҲ‘зҡ„иҜҚжұҮжң¬</h2>
          <div class="flex items-center gap-3">
            <select onchange="STATE.vocabBookFilter=this.value;renderVocabBook()" class="text-sm border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 rounded-lg px-3 py-2 text-gray-700 dark:text-gray-300">
              <option value="all" ${STATE.vocabBookFilter==='all'?'selected':''}>е…ЁйғЁеҚ•иҜҚ</option>
              <option value="й«ҳйў‘" ${STATE.vocabBookFilter==='й«ҳйў‘'?'selected':''}>й«ҳйў‘иҜҚжұҮ</option>
              <option value="дёӯйў‘" ${STATE.vocabBookFilter==='дёӯйў‘'?'selected':''}>дёӯйў‘иҜҚжұҮ</option>
            </select>
            ${words.length > 0 ? `<button onclick="exportVocabBook()" class="text-sm px-3 py-2 rounded-lg border border-gray-300 dark:border-gray-600 text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"><i class="fas fa-download mr-1"></i>еҜјеҮә</button>` : ''}
          </div>
        </div>

        ${words.length === 0 ? `
          <div class="text-center py-16 text-gray-400">
            <i class="fas fa-book-open text-5xl mb-4 block"></i>
            <p class="text-lg mb-2">иҜҚжұҮжң¬дёәз©ә</p>
            <p class="text-sm">йҳ…иҜ»ж–Үз« ж—¶пјҢзӮ№еҮ»з»ҝиүІй«ҳдә®еҚ•иҜҚеҚіеҸҜеҠ е…ҘиҜҚжұҮжң¬</p>
            <button onclick="navigateTo('home')" class="mt-4 px-4 py-2 bg-emerald-500 text-white rounded-lg text-sm font-medium hover:bg-emerald-600 transition-colors">еҺ»йҳ…иҜ»ж–Үз« </button>
          </div>
        ` : `
          <!-- Filter by level -->
          ${(() => {
            let filtered = words;
            if (STATE.vocabBookFilter !== 'all') {
              filtered = words.filter(w => {
                const info = lookupVocab(w);
                return info && info.l === STATE.vocabBookFilter;
              });
            }
            return `
              <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">е…ұ ${filtered.length} дёӘеҚ•иҜҚ</p>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                ${filtered.map(w => {
                  const info = lookupVocab(w) || {p:'',m:'',l:''};
                  return `
                    <div class="flex items-start justify-between p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-emerald-300 dark:hover:border-emerald-700 transition-colors group">
                      <div>
                        <div class="flex items-center gap-2">
                          <span class="font-bold text-gray-900 dark:text-gray-100">${w}</span>
                          <span class="text-xs text-gray-400">${info.p}</span>
                          <span class="text-[10px] px-1.5 py-0.5 rounded-full ${info.l==='й«ҳйў‘'?'bg-red-100 text-red-600 dark:bg-red-900 dark:text-red-300':'bg-yellow-100 text-yellow-600 dark:bg-yellow-900 dark:text-yellow-300'}">${info.l}</span>
                        </div>
                        <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">${info.m}</div>
                      </div>
                      <button onclick="event.stopPropagation();removeVocabWord('${w}')" class="text-gray-300 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 ml-2 flex-shrink-0">
                        <i class="fas fa-trash-alt text-sm"></i>
                      </button>
                    </div>
                  `;
                }).join('')}
              </div>
            `;
          })()}
        `}
      </div>
    </div>
  `;
  app.innerHTML = app_html;
}

function removeVocabWord(word) {
  STATE.vocabBook = STATE.vocabBook.filter(w => w !== word);
  save();
  updateBadges();
  renderVocabBook();
}

function exportVocabBook() {
  const lines = STATE.vocabBook.map(w => {
    const info = lookupVocab(w);
    return info ? `${w} ${info.p} ${info.m} [${info.l}]` : w;
  });
  const blob = new Blob([lines.join('\n')], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'vocab-book.txt'; a.click();
  URL.revokeObjectURL(url);
}

// ================================================================
//  FAVORITES PAGE
// ================================================================

function toggleFavorite(articleId) {
  const idx = STATE.favorites.indexOf(articleId);
  if (idx >= 0) {
    STATE.favorites.splice(idx, 1);
  } else {
    STATE.favorites.push(articleId);
  }
  NEWS_DATA.find(a => a.id === articleId).isFavorited = STATE.favorites.includes(articleId);
  save();
  updateBadges();

  // Update heart icon
  const icon = document.getElementById('heartIcon' + articleId);
  if (icon) {
    const isFav = STATE.favorites.includes(articleId);
    icon.className = (isFav ? 'fas' : 'far') + ' fa-heart text-lg heart-beat';
    const btn = icon.parentElement;
    if (isFav) {
      btn.classList.add('text-red-500', 'bg-red-50', 'dark:bg-red-900');
      btn.classList.remove('text-gray-400');
    } else {
      btn.classList.remove('text-red-500', 'bg-red-50', 'dark:bg-red-900');
      btn.classList.add('text-gray-400');
    }
  }
}

function renderFavorites() {
  const app = document.getElementById('app');
  const favs = NEWS_DATA.filter(a => STATE.favorites.includes(a.id));

  app.innerHTML = `
    <div class="view-enter max-w-4xl mx-auto">
      <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-700 p-6 sm:p-8">
        <h2 class="text-xl font-bold mb-6 flex items-center gap-2"><span class="text-red-500"><i class="fas fa-heart"></i></span> жҲ‘зҡ„ж”¶и—Ҹ</h2>
        ${favs.length === 0 ? `
          <div class="text-center py-16 text-gray-400">

            <p class="text-sm">йҳ…иҜ»ж–Үз« ж—¶зӮ№еҮ»еҝғеҪўеӣҫж ҮеҚіеҸҜж”¶и—Ҹ</p>
            <button onclick="navigateTo('home')" class="mt-4 px-4 py-2 bg-emerald-500 text-white rounded-lg text-sm font-medium hover:bg-emerald-600 transition-colors">еҺ»еҸ‘зҺ°ж–Үз« </button>
          </div>
        ` : `
          <div class="space-y-3">
            ${favs.map(a => `
              <div class="flex items-center justify-between p-4 rounded-xl border border-gray-200 dark:border-gray-700 hover:border-emerald-300 dark:hover:border-emerald-700 transition-colors cursor-pointer" onclick="navigateTo('article', ${a.id})">
                <div class="flex-1 min-w-0">
                  <div class="flex items-center gap-2 mb-1">
                    <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${a.category==='з§‘жҠҖ'?'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300':a.category==='зҺҜеўғ'?'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300':a.category==='з»ҸжөҺ'?'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300':'bg-purple-100 text-purple-700 dark:bg-purple-900 dark:text-purple-300'}">${a.category}</span>
                    <span class="text-xs text-gray-400">${a.date}</span>
                  </div>
                  <h3 class="font-semibold text-gray-900 dark:text-gray-100 truncate">${a.title}</h3>
                  <p class="text-sm text-gray-500 dark:text-gray-400 truncate mt-0.5">${a.summary}</p>
                </div>
                <button onclick="event.stopPropagation();toggleFavorite(${a.id});renderFavorites()" class="ml-4 text-red-500 hover:text-red-600 transition-colors flex-shrink-0">
                  <i class="fas fa-heart-broken"></i>

// ================================================================
//  SENTENCE ANALYSIS PANEL
// ================================================================

function showSentenceDetail(articleId, sentIdx) {
  const a = NEWS_DATA.find(n => n.id === articleId);
  if (!a || !a.sentences || !a.sentences[sentIdx]) return;
  const s = a.sentences[sentIdx];
  const content = document.getElementById('sentencePanelContent');
  content.innerHTML = `
    <div class="mb-5">
      <div class="sp-label text-purple-600 dark:text-purple-400 mb-2">еҺҹж–Ү Original</div>
      <p class="text-gray-800 dark:text-gray-200 leading-relaxed font-serif">${s.original}</p>
    </div>
    <div class="mb-5">
      <div class="sp-label text-blue-600 dark:text-blue-400 mb-2">иҜ‘ж–Ү Translation</div>
      <p class="text-gray-700 dark:text-gray-300 leading-relaxed">${s.translation}</p>
    </div>
    <div class="mb-5">
      <div class="sp-label text-emerald-600 dark:text-emerald-400 mb-2">з»“жһ„еҲҶжһҗ Structure</div>
      <ul class="space-y-1.5">
        ${s.structure.map(st => `<li class="flex items-start gap-2 text-sm text-gray-700 dark:text-gray-300"><span class="text-purple-400 mt-1">&#9670;</span> ${st}</li>`).join('')}
      </ul>
    </div>
    <div>
      <div class="sp-label text-amber-600 dark:text-amber-400 mb-2">иҖғзӮ№жҸҗзӮј Key Points</div>
      <ul class="space-y-1.5">
        ${s.points.map(p => `<li class="flex items-start gap-2 text-sm text-gray-700 dark:text-gray-300"><span class="text-amber-400 mt-1">&#9733;</span> ${p}</li>`).join('')}
      </ul>
    </div>
  `;
  document.getElementById('sentenceOverlay').classList.remove('hidden');

  // Highlight active sentence in article
  document.querySelectorAll('.sentence-mark').forEach(el => el.classList.remove('active'));
  const activeMark = document.querySelector(`.sentence-mark[data-sid="${sentIdx}"]`);
  if (activeMark) activeMark.classList.add('active');
}

function closeSentencePanel() {
  document.getElementById('sentenceOverlay').classList.add('hidden');
  document.querySelectorAll('.sentence-mark').forEach(el => el.classList.remove('active'));
}

// ================================================================
//  KEYBOARD SHORTCUTS
// ================================================================

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    if (!document.getElementById('sentenceOverlay').classList.contains('hidden')) {
      closeSentencePanel();
    } else if (STATE.view === 'article') {
      navigateTo('home');
    }
  }
  if (e.ctrlKey && e.key === 'b' && STATE.view === 'article') {
    e.preventDefault();
    toggleChinese();
  }
});

// ================================================================
//  INITIALIZATION
// ================================================================

function init() {
  applyDark();
  updateBadges();
  navigateTo('home');
}

document.addEventListener('DOMContentLoaded', init);
</script>
